<div class="product-details">

<img id="detailImage"
src="https://via.placeholder.com/400">


<h1 id="detailName">
Product Name
</h1>


<h2 id="detailPrice">
💰 Price
</h2>


<p id="detailCategory">
📂 Category
</p>


<p id="detailStock">
📦 Stock
</p>


<p id="detailDescription">
Description
</p>



<button id="detailCartButton">

🛒 Add To Cart

</button>


<button onclick="addToWishlist(
document.getElementById('detailName').innerText
)">

❤️ Wishlist

</button>



<hr>


<h2>
⭐ Customer Reviews
</h2>


<textarea 
id="reviewText"
placeholder="Write your review">
</textarea>


<select id="reviewRating">

<option value="5">
⭐⭐⭐⭐⭐
</option>

<option value="4">
⭐⭐⭐⭐
</option>

<option value="3">
⭐⭐⭐
</option>

</select>


<button onclick="submitReview()">

Submit Review

</button>


<div id="productReviews">

</div>


</div>
