 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🛍️ Product Finder</h1>
    <p>Find and compare the best products</p>
</header>

<section class="search-section">
    <input type="text" placeholder="Search for products...">
    <button onclick="searchProducts()">Search</button>
</section>

<h2>Featured Products</h2>

<div class="product-grid">

<div class="product">
<h3>📱 Smartphone</h3>
<p>Latest Android smartphones.</p>
<button>View</button>
</div>

<div class="product">
<h3>💻 Laptop</h3>
<p>Powerful laptops for work and gaming.</p>
<button>View</button>
</div>

<div class="product">
<h3>🎧 Headphones</h3>
<p>Premium wireless headphones.</p>
<button>View</button>
</div>

</div>

<footer>
<p>© 2026 Product Finder. All rights reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
