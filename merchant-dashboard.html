<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merchant Dashboard - Product Finder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<h2>🛍️ Product Finder</h2>
<a href="index.html">Home</a>
</nav>

<header>
<h1>🏪 Merchant Dashboard</h1>
<p id="merchantWelcome"></p>
</header>
<div class="product">

<h2>📊 Dashboard Summary</h2>

<p>📦 Total Products: <span id="totalProducts">0</span></p>

<p>
🛒 Total Orders:
<span id="totalOrders">0</span>
</p>

<p>
🔔 New Orders:
<span id="newOrders">0</span>
</p>

<p>❤️ Wishlist Saves: <span id="totalWishlist">0</span></p>

<p>⚖️ Compared Products: <span id="totalCompare">0</span></p>

</div>
<div class="product">

<h2>Seller Menu</h2>

<button onclick="window.location.href='add-product.html'">
➕ Add Product
</button>

<br><br>

<button onclick="window.location.href='merchant-products.html'">
📦 My Products
</button>

<br><br>

<button onclick="window.location.href='merchant-orders.html'">
📋 Orders
</button>

<br><br>

<button onclick="logoutUser()">
🚪 Logout
</button>

</div>

<footer>
<p>© 2026 Product Finder</p>
</footer>
<script>

let merchantLoggedIn = localStorage.getItem("merchantLoggedIn");


if(merchantLoggedIn !== "true"){

    window.location.href = "merchant-login.html";

}

</script>
<script src="script.js"></script>

<script>
let merchant = JSON.parse(localStorage.getItem("merchant"));

if(merchant){
    document.getElementById("merchantWelcome").innerText =
    "Welcome, " + merchant.name;
}
    loadDashboard();
loadNewOrders();
</script>

</body>

</html>
<button onclick="merchantLogout()">
🚪 Logout
</button>
<a href="merchant-add-product.html">
➕ Add Product
</a>
