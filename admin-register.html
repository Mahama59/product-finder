<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Register - Product Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>🛍️ Product Finder Admin</h2>
    <a href="index.html">Home</a>
    <a href="admin-login.html">Admin Login</a>
</nav>

<header>
    <h1>🛠️ Create Admin Account</h1>
    <p>Register a new administrator</p>
</header>

<div class="product">

    <input
        type="text"
        id="adminName"
        placeholder="Full Name">

    <br><br>

    <input
        type="email"
        id="adminEmail"
        placeholder="Email">

    <br><br>

    <input
        type="password"
        id="adminPassword"
        placeholder="Password">

    <br><br>

    <button onclick="registerAdmin()">
        Create Admin Account
    </button>

</div>

<footer>
    <p>© 2026 Product Finder</p>
</footer>

<script src="js/admin.js"></script>
<script src="js/main.js"></script>

</body>
</html>
