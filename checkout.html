<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Product Finder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="loadCheckoutCart()">

<nav>
    <h2>🛍️ Product Finder</h2>

    <div class="menu">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="categories.html">Categories</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<header>
    <h1>🛒 Checkout</h1>
    <p>Complete your purchase</p>
</header>

<div class="product">

    <h2>Your Order</h2>

    <div id="checkoutItems">
        <p>Your cart items will appear here.</p>
    </div>


    <h2>Customer Information</h2>

    <input type="text" placeholder="Full Name">

    <br><br>

    <input type="email" placeholder="Email Address">

    <br><br>

    <input type="text" placeholder="Delivery Address">


    <h2>Payment Method</h2>

<select id="paymentMethod" onchange="showPaymentDetails()">
    <option value="">Select Payment</option>
    <option value="momo">🇬🇭 Ghana Mobile Money</option>
    <option value="visa">💳 Visa Card</option>
    <option value="mastercard">💳 MasterCard</option>
</select>


<div id="momoDetails" style="display:none;">

    <h3>🇬🇭 Mobile Money Details</h3>

    <label>Network:</label>

    <select>
        <option>MTN Mobile Money</option>
        <option>Vodafone Cash</option>
        <option>AirtelTigo Money</option>
    </select>

    <br><br>

    <input id="momoNumber" type="text" placeholder="Mobile Money Number">

<br><br>

<button onclick="confirmMomoPayment()">
    Confirm Mobile Money Payment
</button>

</div>

    <br><br>

    <button onclick="completeOrder()">
    Complete Order
</button>

</div>


<footer>
    <p>© 2026 Product Finder. All rights reserved.</p>
</footer>
<script src="script.js"></script>

</body>

</html>
