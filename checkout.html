<header>

<h1>🛒 Checkout</h1>

<p>Complete your purchase</p>

</header>




<div class="product">


<h2>🛍️ Your Order</h2>


<div id="checkoutItems">

<p>Loading cart...</p>

</div>



<h3>

💰 Total: $<span id="checkoutTotal">0</span>

</h3>



<hr>



<h2>👤 Customer Information</h2>


<input 
id="customerName"
type="text"
placeholder="Full Name">


<br><br>


<input 
id="customerEmail"
type="email"
placeholder="Email Address">


<br><br>


<input 
id="customerAddress"
type="text"
placeholder="Delivery Address">



<hr>




<h2>💳 Payment Method</h2>


<select id="paymentMethod">


<option value="momo">
🇬🇭 Ghana Mobile Money
</option>


<option value="card">
💳 Card Payment
</option>


</select>



<br><br>



<div id="momoDetails">


<h3>
🇬🇭 Mobile Money
</h3>



<select id="momoNetwork">


<option>
MTN Mobile Money
</option>


<option>
Vodafone Cash
</option>


<option>
AirtelTigo Money
</option>


</select>



<br><br>



<input

id="momoNumber"

type="text"

placeholder="MoMo Number">


</div>



<br><br>



<button onclick="payWithPaystack()">

💳 Pay Now

</button>



<br><br>



<button onclick="completeOrder()">

✅ Complete Order

</button>



</div>
