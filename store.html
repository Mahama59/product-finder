<!DOCTYPE html>
<html>

<head>

<title>Merchant Store</title>

<link rel="stylesheet" href="style.css">

</head>

<body onload="loadStore()">

<nav>

<h2>🛍️ Product Finder</h2>

<a href="index.html">Home</a>

</nav>

<header>

</header>
<div class="product">

<img id="storeLogo" width="150">


<h2 id="storeName">
Merchant Store
</h2>


<p id="storeDescription"></p>


<p>
⭐ Rating:
<span id="storeRating">
5/5
</span>
</p>


<p>

<span id="storeFollowers">
0
</span>
</p>


<button onclick="followStore()">

<button onclick="followStore()">

<br><br>

placeholder="Write your review">

<button onclick="submitStoreReview()">

Submit Review

<div id="storeReviews">

</div>
