<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merchant Store - Product Finder</title>

<link rel="stylesheet" href="style.css">

</head>


<body onload="loadStore()">



<nav>

<h2>🛍️ Product Finder</h2>

<a href="index.html">
🏠 Home
</a>

</nav>



<div class="store-banner">

<img id="storeBanner"
src="https://via.placeholder.com/900x250">

</div>




<div class="product">



<img id="storeLogo"
width="150">



<h1 id="storeName">
Store Name
</h1>



<h3 id="verifiedBadge">

</h3>



<p id="storeDescription">
Store description
</p>



<p>
⭐ Store Rating:
<span id="storeRating">
No ratings
</span>
</p>



<p>
👥 Followers:
<span id="storeFollowers">
0
</span>
</p>



<p>
👁 Store Views:
<span id="storeViews">
0
</span>
</p>



<p>
📦 Total Products:
<span id="storeProductCount">
0
</span>
</p>



<p>
📅 Joined:
<span id="storeJoined">
Unknown
</span>
</p>



<button id="followButton" onclick="followStore()">

❤️ Follow Store

</button>


</div>




<hr>




<h2>
🔍 Search This Store
</h2>


<input 
id="storeSearch"
placeholder="Search products in this store"
onkeyup="searchStoreProducts()">





<h2>
📂 Store Categories
</h2>


<div id="storeCategories">

</div>





<hr>



<h2>
📦 Seller Products
</h2>



<select id="storeSort"
onchange="sortStoreProducts()">


<option value="default">
Sort Products
</option>


<option value="low">
Lowest Price
</option>


<option value="high">
Highest Price
</option>


<option value="new">
Newest
</option>


</select>





<div id="storeProducts" class="product-grid">

</div>





<hr>




<h2>
⭐ Store Reviews
</h2>



<div id="storeReviews">

<p>
No reviews yet.
</p>


</div>





<script src="script.js"></script>


</body>

</html>
