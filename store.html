<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merchant Store - Product Finder</title>

<link rel="stylesheet" href="style.css">

</head>

<body onload="loadStore()">


<nav>

<h2>🛍️ Product Finder</h2>

<a href="index.html">
🏠 Home
</a>

</nav>


<div class="store-banner">

<img id="storeBanner"
src="https://via.placeholder.com/900x250">

</div>



<div class="product">


<img id="storeLogo"
width="150">



<h1 id="storeName">
Store Name
</h1>


<h3>
<span id="verifiedBadge"></span>
</h3>



<p id="storeDescription">
Store description
</p>


<p>
⭐ Rating:
<span id="storeRating">
No ratings
</span>
</p>


<p>
👥 Followers:
<span id="storeFollowers">
0
</span>
</p>



<button onclick="followStore()">

❤️ Follow Store

</button>


</div>



<hr>


<h2>
📦 Seller Products
</h2>


<div id="storeProducts" class="product-grid">

</div>



<hr>


<h2>
⭐ Store Reviews
</h2>


<div id="storeReviews">

<p>
No reviews yet.
</p>

</div>



<script src="script.js"></script>


</body>

</html>
